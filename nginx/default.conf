# ============================================================
# Nginx — Wildcard Subdomain Reverse Proxy (HTTP & HTTPS)
# ============================================================
# Handles: *.aratatt.com  →  Django (gunicorn)
# Static/Media files served directly by Nginx for performance.
# ============================================================

upstream django {
    server web:8000;
}

# --- Redirect HTTP to HTTPS & Handle ACME Challenge ---
server {
    listen 80 default_server;
    server_name aratatt.com *.aratatt.com rawaage.com *.rawaage.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server block (aratatt.com) ---
server {
    listen 443 ssl;
    server_name aratatt.com *.aratatt.com;

    # --- SSL Configuration ---
    ssl_certificate     /etc/nginx/ssl/live/aratatt.com-0001/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/aratatt.com-0001/privkey.pem;

    include /etc/nginx/conf.d/common_params.conf;
}

# --- HTTPS Server block (rawaage.com) ---
server {
    listen 443 ssl default_server;
    server_name rawaage.com *.rawaage.com;

    # --- SSL Configuration ---
    ssl_certificate     /etc/nginx/ssl/live/rawaage.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/rawaage.com/privkey.pem;

    include /etc/nginx/conf.d/common_params.conf;
}