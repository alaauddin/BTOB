# ============================================================
# Nginx — Wildcard Subdomain Reverse Proxy
# ============================================================
# Handles: *.rawaaj.com  →  Django (gunicorn)
# Static/Media files served directly by Nginx for performance.
# ============================================================

upstream django {
    server web:8000;
}

# --- Main domain + wildcard subdomains ---
server {
    listen 80;
    server_name aratatt.com *.aratatt.com;

    # --- SSL (uncomment when you have certificates) ---
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Redirect HTTP to HTTPS (uncomment for production) ---
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Static files (served by Nginx) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Media files (served by Nginx) ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Favicon ---
    location = /favicon.ico {
        alias /app/staticfiles/logo.png;
        access_log off;
        log_not_found off;
    }

    # --- All other requests → Django ---
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Body size (file uploads)
        client_max_body_size 10M;
    }
}
