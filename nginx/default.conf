# ============================================================
# Nginx — Wildcard Subdomain Reverse Proxy (HTTP only)
# ============================================================
# Handles: *.aratatt.com  →  Django (gunicorn)
# Static/Media files served directly by Nginx for performance.
# ============================================================

upstream django {
    server web:8000;
}

# --- Catch-all: main domain + wildcard subdomains + IP ---
server {
    listen 80 default_server;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Static files (served by Nginx) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Media files (served by Nginx) ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Favicon ---
    location = /favicon.ico {
        alias /app/staticfiles/logo.png;
        access_log off;
        log_not_found off;
    }

    # --- All other requests → Django ---
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        client_max_body_size 10M;
    }
}
