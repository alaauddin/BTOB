<div id="branding-modal" class="fixed inset-0 z-[9000] hidden flex items-center justify-center p-4" style="z-index: 9005 !important;">
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity" onclick="closeBrandingModal()"></div>
    
    <div class="bg-white w-full max-w-md rounded-[32px] shadow-2xl relative z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300" style="max-height: 90vh;">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white flex-shrink-0">
            <div>
                <h3 class="text-lg font-bold text-slate-900">هوية المتجر</h3>
                <p class="text-[11px] text-slate-400 mt-0.5">حدث شعار وغلاف متجرك</p>
            </div>
            <button onclick="closeBrandingModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 overflow-y-auto custom-scrollbar flex-grow">
            <form id="brandingForm" onsubmit="submitForm(event, 'brandingForm', 'branding')">
                {% csrf_token %}
                <input type="hidden" name="supplier_id" value="{{ supplier.id }}">
                <input type="hidden" name="form_type" value="branding">
                
                <div class="space-y-6">
                    <!-- Logo Upload -->
                    <div class="relative group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">شعار المتجر</label>
                        <div class="w-full h-32 rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center bg-slate-50 group-hover:bg-blue-50 group-hover:border-blue-200 transition-all overflow-hidden relative shadow-inner cursor-pointer" onclick="document.getElementById('profile_input_branding').click()">
                            {% if supplier.profile_picture %}
                                <img src="{{ supplier.profile_picture.url }}" id="profile_preview_branding" class="w-full h-full object-cover opacity-60">
                            {% else %}
                                <img src="" id="profile_preview_branding" class="w-full h-full object-cover opacity-60 hidden">
                            {% endif %}
                            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center p-4">
                                <i class="fas fa-cloud-upload-alt text-2xl text-slate-400 mb-1 group-hover:text-blue-500"></i>
                                <span class="text-xs font-bold text-slate-500 group-hover:text-blue-600">اختر شعاراً جديداً</span>
                            </div>
                            {{ branding_form.profile_picture }}
                        </div>
                    </div>
                    
                    <!-- Banner Upload -->
                    <div class="relative group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">صورة الغلاف</label>
                        <div class="w-full h-32 rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center bg-slate-50 group-hover:bg-purple-50 group-hover:border-purple-200 transition-all overflow-hidden relative shadow-inner cursor-pointer" onclick="document.getElementById('banner_input_branding').click()">
                            {% if supplier.panal_picture %}
                                <img src="{{ supplier.panal_picture.url }}" id="banner_preview_branding" class="w-full h-full object-cover opacity-60">
                            {% else %}
                                <img src="" id="banner_preview_branding" class="w-full h-full object-cover opacity-60 hidden">
                            {% endif %}
                            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center p-4">
                                <i class="fas fa-image text-2xl text-slate-400 mb-1 group-hover:text-purple-500"></i>
                                <span class="text-xs font-bold text-slate-500 group-hover:text-purple-600">اختر غلافاً جديداً</span>
                            </div>
                            {{ branding_form.panal_picture }}
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="px-6 py-5 bg-white border-t border-slate-100 flex-shrink-0 shadow-[0_-4px_20px_-5px_rgba(0,0,0,0.05)]">
            <button type="submit" form="brandingForm" 
                class="w-full py-4 rounded-2xl font-black text-lg hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg"
                style="background-color: #ED7D31 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(237, 125, 49, 0.3);">
                <i class="fas fa-save"></i>
                <span>حفظ الهوية</span>
            </button>
        </div>
    </div>
</div>

<script>
    function openBrandingModal() {
        document.getElementById('branding-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeBrandingModal() {
        document.getElementById('branding-modal').classList.add('hidden');
        document.body.style.overflow = '';
    }

    // Auto-previews for branding modal inputs
    document.getElementById('profile_input_branding').onchange = function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('profile_preview_branding');
                preview.src = e.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(this.files[0]);
        }
    };

    document.getElementById('banner_input_branding').onchange = function() {
        if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('banner_preview_branding');
                preview.src = e.target.result;
                preview.classList.remove('hidden');
            };
            reader.readAsDataURL(this.files[0]);
        }
    };
</script>
