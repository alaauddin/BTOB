<div id="domain-modal" class="fixed inset-0 z-[9000] hidden flex items-center justify-center p-4" style="z-index: 9005 !important;">
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity" onclick="closeDomainModal()"></div>
    
    <div class="bg-white w-full max-w-md rounded-[32px] shadow-2xl relative z-10 overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300" style="max-height: 90vh;">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white flex-shrink-0">
            <div>
                <h3 class="text-lg font-bold text-slate-900">إعدادات النطاق</h3>
                <p class="text-[11px] text-slate-400 mt-0.5">اختر رابطاً مميزاً لمتجرك</p>
            </div>
            <button onclick="closeDomainModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 overflow-y-auto flex-grow">
            <form id="domainForm" onsubmit="submitForm(event, 'domainForm', 'domain')">
                {% csrf_token %}
                <input type="hidden" name="supplier_id" value="{{ supplier.id }}">
                <input type="hidden" name="form_type" value="domain">
                
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 mr-2">النطاق الفرعي (Subdomain)</label>
                        <div class="relative" dir="ltr">
                            {{ domain_form.subdomain }}
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 text-sm font-medium border-l border-slate-100 pl-3 my-2">
                                .{{ PLATFORM_DOMAIN }}
                            </div>
                        </div>
                        <p class="text-[10px] text-slate-400 mt-1 mr-2 italic">مثال: mystore (سيصبح mystore.{{ PLATFORM_DOMAIN }})</p>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="px-6 py-5 bg-white border-t border-slate-100 flex-shrink-0 shadow-[0_-4px_20px_-5px_rgba(0,0,0,0.05)]">
            <button type="submit" form="domainForm" 
                class="w-full py-4 rounded-2xl font-black text-lg hover:shadow-lg hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg"
                style="background-color: #ED7D31 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(237, 125, 49, 0.3);">
                <i class="fas fa-save"></i>
                <span>حفظ النطاق</span>
            </button>
        </div>
    </div>
</div>

<script>
    function openDomainModal() {
        document.getElementById('domain-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeDomainModal() {
        document.getElementById('domain-modal').classList.add('hidden');
        document.body.style.overflow = '';
    }
</script>
